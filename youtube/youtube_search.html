<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>検索結果 - Horizon Live Production</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #0f0f0f;
            --secondary-text: #606060;
            --border-color: #eee;
            --hover-color: #f2f2f2;
            --yt-red: #ff0000;
        }
        [data-theme="dark"] {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --secondary-text: #aaaaaa;
            --border-color: #333333;
            --hover-color: #262626;
        }

        body {
            margin: 0;
            font-family: "Roboto", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .header {
            height: 56px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }

        .search-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* フィルタリングタブ */
        .filter-tabs {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 16px;
            overflow-x: auto;
        }

        .filter-tab {
            padding: 6px 12px;
            background-color: var(--hover-color);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            border: none;
            color: var(--text-color);
        }

        .filter-tab.active {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .search-info {
            font-size: 14px;
            color: var(--secondary-text);
            margin-bottom: 20px;
        }

        /* 検索結果のスタイル */
        .result-item {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .thumb-container {
            position: relative;
            flex-shrink: 0;
        }

        .result-thumb {
            width: 360px;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            object-fit: cover;
            background-color: var(--hover-color);
        }

        /* Shorts用スタイル（縦長） */
        .type-shorts .result-thumb {
            width: 200px;
            aspect-ratio: 9 / 16;
        }

        .result-info {
            flex: 1;
        }

        .result-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0 0 4px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* バッジスタイル */
        .badge {
            display: inline-block;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 6px;
            vertical-align: middle;
        }
        .badge-live { background-color: var(--yt-red); color: white; }
        .badge-shorts { background-color: #ff8c00; color: white; }
        .badge-playlist { background-color: rgba(0,0,0,0.8); color: white; }

        .result-meta {
            font-size: 12px;
            color: var(--secondary-text);
            margin-bottom: 12px;
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .channel-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        @media (max-width: 768px) {
            .result-item { flex-direction: column; }
            .result-thumb { width: 100% !important; }
            .type-shorts .result-thumb { aspect-ratio: 16 / 9; object-fit: cover; }
        }
    </style>
</head>
<body>

<div class="header">
    <div style="cursor:pointer; font-size: 20px;" onclick="history.back()">←</div>
    <div style="flex:1; text-align:center;">
        <strong id="searchQueryTitle"></strong>
    </div>
</div>

<div class="search-container">
    <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterResults('all')">すべて</button>

        <button class="filter-tab" onclick="filterResults('shorts')">Shorts</button>
        <button class="filter-tab" onclick="filterResults('live')">ライブ</button>
        <button class="filter-tab" onclick="filterResults('playlist')">再生リスト</button>

    <div id="searchInfo" class="search-info"></div>

</div>

        { title: "【解説】戦艦の歴史を30分で完全理解", type: "live", channel: "夕陽ヶ丘 艦子", channelIcon: "yuhigaoka.png", thumb: "kan-ko_history.jpg", url: "youtube_yuhigaoka/yuhigaoka_channel.html", views: "8.9万回", date: "1週間前" }
    ];

    let currentQuery = "";
    let currentFilter = "all";

    function performSearch() {
        const params = new URLSearchParams(window.location.search);
        currentQuery = params.get('q') ? params.get('q').toLowerCase() : "";
        document.getElementById('searchQueryTitle').innerText = currentQuery;
        renderResults();
    }

    function filterResults(type) {
        currentFilter = type;
        // タブの活性状態を更新
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.classList.remove('active');
            if(tab.innerText.toLowerCase().includes(type) || (type === 'all' && tab.innerText === 'すべて')) {
                tab.classList.add('active');
            }
        });
        renderResults();
    }

    function renderResults() {
        const resultsList = document.getElementById('resultsList');
        const searchInfo = document.getElementById('searchInfo');
        
        // 1. キーワードで絞り込み
        let filtered = videoDatabase.filter(v => 
            v.title.toLowerCase().includes(currentQuery) || 
            v.channel.toLowerCase().includes(currentQuery)
        );

        // 2. タイプで絞り込み
        if (currentFilter !== 'all') {
            filtered = filtered.filter(v => v.type === currentFilter);
        }

        searchInfo.innerText = `約 ${filtered.length} 件のヒット`;

        if (filtered.length === 0) {
            resultsList.innerHTML = "<p>一致する結果は見つかりませんでした。</p>";
            return;
        }

        resultsList.innerHTML = filtered.map(v => {
            // バッジの判定
            let badgeHtml = "";
            if(v.type === 'live') badgeHtml = '<span class="badge badge-live">● ライブ</span>';
            if(v.type === 'shorts') badgeHtml = '<span class="badge badge-shorts">Shorts</span>';
            if(v.type === 'playlist') badgeHtml = '<span class="badge badge-playlist">再生リスト</span>';

            return `
                <a href="${v.url}" class="result-item type-${v.type}">
                    <div class="thumb-container">
                        <img src="${v.thumb}" class="result-thumb" alt="thumbnail">
                    </div>
                    <div class="result-info">
                        <h3 class="result-title">${badgeHtml}${v.title}</h3>
                        <p class="result-meta">${v.views}視聴 • ${v.date}</p>
                        <div class="channel-info">
                            <img src="${v.channelIcon}" class="channel-icon">
                            <span style="font-size:13px; color:var(--secondary-text);">${v.channel}</span>
                        </div>
                    </div>
                </a>
            `;
        }).join('');
    }

    window.onload = performSearch;
</script>
