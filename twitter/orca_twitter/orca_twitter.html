```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社地オルカ | X</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial;
background:#f0f2f5;
display:flex;
justify-content:center;
}

/* レイアウト */

.wrapper{
display:flex;
width:1200px;
}

/* 左メニュー */

.sidebar{
width:250px;
padding:20px;
}

.menu-item{
padding:12px;
font-size:20px;
display:flex;
gap:10px;
cursor:pointer;
border-radius:30px;
}

.menu-item:hover{background:#eee}

/* タイムライン */

.timeline{
flex:1;
background:white;
border-left:1px solid #ddd;
border-right:1px solid #ddd;
}

/* プロフィール */

.profile-header{
height:180px;
background:#1da1f2;
}

.profile-info{
padding:15px;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
border:4px solid white;
margin-top:-45px;
}

.name{
font-weight:bold;
font-size:20px;
}

.handle{color:#666}

.stats{margin-top:10px;color:#555}

/* 投稿 */

.post-box{
display:flex;
gap:10px;
padding:15px;
border-top:1px solid #eee;
border-bottom:1px solid #eee;
flex-wrap:wrap;
}

textarea{
flex:1;
border:none;
resize:none;
font-size:16px;
outline:none;
}

.post-btn{
background:#1da1f2;
border:none;
color:white;
padding:8px 20px;
border-radius:20px;
cursor:pointer;
}

/* ツイート */

.tweet{
display:flex;
gap:10px;
padding:15px;
border-bottom:1px solid #eee;
}

.tweet-body{flex:1}

.tweet-text{
margin-top:5px;
line-height:1.6;
}

.tweet-img{
width:100%;
border-radius:15px;
margin-top:10px;
}

.tweet-video{
width:100%;
margin-top:10px;
border-radius:15px;
}

/* 固定 */

.pinned{
font-size:12px;
color:#666;
}

/* アクション */

.actions{
display:flex;
gap:25px;
margin-top:10px;
color:#666;
}

.action{cursor:pointer}

.liked{
color:#e0245e;
animation:likePop .3s;
}

@keyframes likePop{

0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}

}

/* コメント */

.comments{
margin-top:10px;
padding-left:20px;
border-left:2px solid #eee;
}

.comment{
font-size:14px;
margin-top:5px;
}

/* DM */

.dm-screen{
position:fixed;
right:20px;
bottom:80px;
width:300px;
background:white;
border:1px solid #ddd;
padding:10px;
display:none;
}

.dm-messages{
height:200px;
overflow:auto;
margin-bottom:10px;
}

/* モバイル */

.mobile-nav{
display:none;
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
border-top:1px solid #ddd;
justify-content:space-around;
padding:10px 0;
}

.mobile-nav i{font-size:22px}

@media(max-width:1000px){

.sidebar{display:none}
.wrapper{width:100%}
.mobile-nav{display:flex}

}

</style>
</head>

<body>

<div class="wrapper">

<!-- 左メニュー -->

<div class="sidebar">

<div class="menu-item"><i class="fa-solid fa-house"></i>ホーム</div>
<div class="menu-item"><i class="fa-solid fa-user"></i>プロフィール</div>
<div class="menu-item" onclick="openDM()">
<i class="fa-solid fa-envelope"></i>DM
</div>

</div>

<!-- タイムライン -->

<div class="timeline">

<div class="profile-header"></div>

<div class="profile-info">

<img class="avatar" src="../orca.png">

<div class="name">社地オルカ</div>
<div class="handle">@orca</div>

<div class="stats">
フォロー <span id="following">12</span>
フォロワー <span id="followers">8245</span>
</div>

<button onclick="followUser()" id="followBtn">
フォロー
</button>

</div>

<!-- 投稿フォーム -->

<div class="post-box">

<img src="../orca.png" width="40">

<textarea id="tweetInput"
placeholder="いまどうしてる？"></textarea>

<input type="file" id="imageUpload" accept="image/*">

<input type="text" id="videoURL"
placeholder="YouTube動画URL">

<button class="post-btn"
onclick="postTweet()">ポスト</button>

</div>

<div id="timeline">

<!-- 固定ツイート -->

<div class="tweet">

<img src="../orca.png" width="48">

<div class="tweet-body">

<div class="pinned">
<i class="fa-solid fa-thumbtack"></i> 固定ポスト
</div>

<b>社地オルカ</b> @orca

<div class="tweet-text">
ここが私の縄張りだ
</div>

<img class="tweet-img" src="../orca.png">

<div class="actions">

<div class="action comment-btn">
<i class="fa-regular fa-comment"></i>
</div>

<div class="action like-btn" onclick="like(this)">
<i class="fa-regular fa-heart"></i>
</div>

</div>

<div class="comments"></div>

</div>

</div>

</div>

</div>

</div>

<!-- DM -->

<div class="dm-screen" id="dmScreen">

<h3>DM</h3>

<div class="dm-messages" id="dmMessages"></div>

<input id="dmInput" placeholder="メッセージ">

<button onclick="sendDM()">送信</button>

</div>

<!-- モバイル -->

<div class="mobile-nav">

<i class="fa-solid fa-house"></i>
<i class="fa-solid fa-search"></i>
<i class="fa-solid fa-bell"></i>
<i class="fa-solid fa-envelope" onclick="openDM()"></i>

</div>

<script>

function like(el){

const icon = el.querySelector("i")

icon.classList.toggle("fa-regular")
icon.classList.toggle("fa-solid")

el.classList.toggle("liked")

}

/* フォロー */

let followed=false

function followUser(){

const followers=document.getElementById("followers")
let count=parseInt(followers.innerText)

if(!followed){

count++
followBtn.innerText="フォロー中"

}else{

count--
followBtn.innerText="フォロー"

}

followers.innerText=count
followed=!followed

}

/* 投稿 */

function postTweet(){

const text=document.getElementById("tweetInput").value
const file=document.getElementById("imageUpload").files[0]
const video=document.getElementById("videoURL").value

let imageHTML=""
let videoHTML=""

if(file){

const url=URL.createObjectURL(file)
imageHTML=`<img class="tweet-img" src="${url}">`

}

if(video){

const id=video.split("v=")[1]
videoHTML=`<iframe class="tweet-video" height="300"
src="https://www.youtube.com/embed/${id}"
frameborder="0" allowfullscreen></iframe>`

}

if(!text && !file && !video) return

const tweet=`

<div class="tweet">

<img src="../../orca.png" width="48">

<div class="tweet-body">

<b>社地オルカ</b> @orca

<div class="tweet-text">${text}</div>

${imageHTML}

${videoHTML}

<div class="actions">

<div class="action comment-btn">
<i class="fa-regular fa-comment"></i>
</div>

<div class="action like-btn" onclick="like(this)">
<i class="fa-regular fa-heart"></i>
</div>

</div>

<div class="comments"></div>

</div>

</div>

`

document
.getElementById("timeline")
.insertAdjacentHTML("afterbegin",tweet)

tweetInput.value=""
imageUpload.value=""
videoURL.value=""

}

/* コメント */

document.addEventListener("click",function(e){

if(e.target.closest(".comment-btn")){

const tweet=e.target.closest(".tweet")

const text=prompt("コメントを書く")

if(!text) return

const comment=`<div class="comment"><b>ユーザー</b> ${text}</div>`

tweet
.querySelector(".comments")
.insertAdjacentHTML("beforeend",comment)

}

})

/* DM */

function openDM(){

const dm=document.getElementById("dmScreen")

dm.style.display=
dm.style.display==="block"?"none":"block"

}

function sendDM(){

const text=document.getElementById("dmInput").value

if(!text) return

const msg=`<div><b>あなた:</b> ${text}</div>`

document
.getElementById("dmMessages")
.insertAdjacentHTML("beforeend",msg)

dmInput.value=""

}

</script>

</body>
</html>
```
